<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCOM-SHORTE-CORE // Binary Sluice-Gate</title>
    <style>
        body { background-color: #0d0d0d; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; margin: 0; }
        .container { max-width: 100%; width: 650px; margin: 0 auto; border: 2px solid #00ff00; padding: 15px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); box-sizing: border-box; }
        h1 { text-align: center; font-size: 1.2rem; text-transform: uppercase; border-bottom: 2px dashed #00ff00; padding-bottom: 10px; margin-top: 5px; }
        .button-cluster { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        button { background-color: #1a1a1a; color: #00ff00; border: 1px solid #00ff00; padding: 10px 5px; font-family: 'Courier New', monospace; font-weight: bold; font-size: 0.85rem; cursor: pointer; }
        button:active { background-color: #00ff00; color: #0d0d0d; }
        #btn-start { border-color: #00ff00; color: #00ff00; }
        #btn-test { border-color: #ffff00; color: #ffff00; }
        #btn-resume { border-color: #00ffff; color: #00ffff; }
        #btn-end { border-color: #ff0000; color: #ff0000; }
        .dashboard { background-color: #111; border: 1px solid #333; padding: 10px; margin-bottom: 15px; }
        .metric-line { display: flex; justify-content: space-between; margin: 6px 0; font-size: 0.95rem; border-bottom: 1px dotted #222; }
        .metric-val { color: #ffffff; }
        #val-rejected { color: #ff3333; }
        #val-saved { color: #00ffff; }
        .terminal-box { background-color: #000; border: 1px solid #00ff00; height: 200px; overflow-y: scroll; padding: 8px; font-size: 0.8rem; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="container">
    <h1>ENCOM-SHORTE V1.0 // GATE ENGINE</h1>
    <div class="button-cluster">
        <button id="btn-start" onclick="engineStart()">START</button>
        <button id="btn-test" onclick="engineTest()">TEST</button>
        <button id="btn-resume" onclick="engineResume()">RESUME</button>
        <button id="btn-end" onclick="engineEnd()">END</button>
    </div>
    <div class="dashboard">
        <div class="metric-line"><span>Total Packets Ingested:</span><span id="val-total" class="metric-val">0</span></div>
        <div class="metric-line"><span>Accepted (New Species Pattern):</span><span id="val-accepted" class="metric-val">0</span></div>
        <div class="metric-line"><span>Truncated (Breed Bloat Rejected):</span><span id="val-rejected">0</span></div>
        <div class="metric-line"><span>Sluice Rejection Rate:</span><span id="val-rate" class="metric-val">0.00%</span></div>
        <div class="metric-line"><span>Est. Server Energy Saved:</span><span id="val-saved">0.00000000 kWh</span></div>
    </div>
    <div class="terminal-box" id="terminal-log">SYSTEM STANDBY. TAP 'START' TO LIVE TRIGGER ENGINE...</div>
</div>
<script>
    let isRunning = false; let timerLoop = null; let lastValidLength = null;
    let totalProcessed = 0; let acceptedCount = 0; let rejectedCount = 0; let energySaved = 0.0;
    const energyPerReject = 0.00000002;
    const logBox = document.getElementById("terminal-log");

    function logToTerminal(msg) {
        logBox.innerText += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.scrollTop = logBox.scrollHeight;
    }
    function engineStart() {
        if (!isRunning) { isRunning = true; logToTerminal(">>> SLUICE GATE ENGINE LOGIC ONLINE."); runEngineLoop(); }
    }
    function engineTest() {
        isRunning = false; clearTimeout(timerLoop); logToTerminal(">>> RUNNING SPECIES PATTERN LENGTH TESTING...");
        processBinaryPacket("BINARY_STREAM_SPECIES_SIGNATURE_DOG_64BIT");
        processBinaryPacket("BINARY_STREAM_SPECIES_SIGNATURE_DOG_64BIT");
        processBinaryPacket("BINARY_STREAM_BREED_DATA_METADATA_PIG_OVERLOAD_96BIT");
    }
    function engineResume() {
        if (!isRunning) { isRunning = true; logToTerminal(">>> RE-ESTABLISHING STREAMS..."); runEngineLoop(); }
    }
    function engineEnd() { isRunning = false; clearTimeout(timerLoop); logToTerminal(">>> ENGINE GATES SHUT DOWN."); }

    function processBinaryPacket(packetString) {
        totalProcessed++; let currentLength = packetString.length;
        if (lastValidLength !== null && currentLength === lastValidLength) {
            rejectedCount++; energySaved += energyPerReject;
            logToTerminal(`REJECT: Redundant structural length (${currentLength} bits). Truncated.`);
        } else {
            lastValidLength = currentLength; acceptedCount++;
            logToTerminal(`ACCEPT: New structural species width verified (${currentLength} bits). Passed.`);
        }
        let rate = totalProcessed > 0 ? ((rejectedCount / totalProcessed) * 100) : 0;
        document.getElementById("val-total").innerText = totalProcessed;
        document.getElementById("val-accepted").innerText = acceptedCount;
        document.getElementById("val-rejected").innerText = rejectedCount;
        document.getElementById("val-rate").innerText = rate.toFixed(2) + "%";
        document.getElementById("val-saved").innerText = energySaved.toFixed(8) + " kWh";
    }
    function runEngineLoop() {
        if (!isRunning) return;
        const patterns = ["BINARY_STREAM_SPECIES_SIGNATURE_DOG_64BIT", "BINARY_STREAM_SPECIES_SIGNATURE_DOG_64BIT", "BINARY_STREAM_BREED_DATA_METADATA_CHOW_CHOW_BLU_128BIT"];
        processBinaryPacket(patterns[Math.floor(Math.random() * patterns.length)]);
        timerLoop = setTimeout(runEngineLoop, 1500);
    }
</script>
</body>
</html>
