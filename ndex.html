<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCOM-SHORTE-CORE // Binary Sluice-Gate</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #00ff00;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px dashed #00ff00;
            padding-bottom: 10px;
        }
        .button-cluster {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        button {
            background-color: #1a1a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #00ff00;
            color: #0d0d0d;
            box-shadow: 0 0 10px #00ff00;
        }
        #btn-start { border-color: #00ff00; color: #00ff00; }
        #btn-test { border-color: #ffff00; color: #ffff00; }
        #btn-resume { border-color: #00ffff; color: #00ffff; }
        #btn-end { border-color: #ff0000; color: #ff0000; }
        
        .dashboard {
            background-color: #111;
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 20px;
        }
        .metric-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 1.05rem;
            border-bottom: 1px dotted #222;
        }
        .metric-val { color: #ffffff; }
        #val-rejected { color: #ff3333; }
        #val-saved { color: #00ffff; }

        .terminal-box {
            background-color: #000;
            border: 1px solid #00ff00;
            height: 250px;
            overflow-y: scroll;
            padding: 10px;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ENCOM-SHORTE SYSTEM V1.0 (Open-Source)</h1>
    
    <!-- 4 CORE INTERACTIVE CONTROL BUTTONS -->
    <div class="button-cluster">
        <button id="btn-start" onclick="engineStart()">START</button>
        <button id="btn-test" onclick="engineTest()">TEST</button>
        <button id="btn-resume" onclick="engineResume()">RESUME</button>
        <button id="btn-end" onclick="engineEnd()">END</button>
    </div>

    <!-- LIVE DATA METRICS DASHBOARD -->
    <div class="dashboard">
        <div class="metric-line"><span>Total Ingested Packets:</span><span id="val-total" class="metric-val">0</span></div>
        <div class="metric-line"><span>Accepted (Clean Species Pattern):</span><span id="val-accepted" class="metric-val">0</span></div>
        <div class="metric-line"><span>Truncated/Rejected (Breed Bloat):</span><span id="val-rejected">0</span></div>
        <div class="metric-line"><span>Sluice Rejection Rate:</span><span id="val-rate" class="metric-val">0.00%</span></div>
        <div class="metric-line"><span>Estimated Data Server Energy Saved:</span><span id="val-saved">0.00000000 kWh</span></div>
    </div>

    <!-- VISUAL TERMINAL OUTPUT -->
    <div class="terminal-box" id="terminal-log">SYSTEM STANDBY. TAP 'START' TO INITIALIZE SLUICE GATE ENGINE...</div>
</div>

<script>
    // --- SERVER LOGIC RUNNING INSIDE THE INTERFACE ---
    let isRunning = false;
    let timerLoop = null;
    let lastValidLength = null;
    
    let totalProcessed = 0;
    let acceptedCount = 0;
    let rejectedCount = 0;
    let energySaved = 0.0;
    const energyPerReject = 0.00000002; // kWh saved per truncated write operation

    const logBox = document.getElementById("terminal-log");

    function logToTerminal(message) {
        const timestamp = new Date().toLocaleTimeString();
        logBox.innerText += `\n[${timestamp}] ${message}`;
        logBox.scrollTop = logBox.scrollHeight; // Auto-scroll to view newest inputs
    }

    // --- BUTTON EVENT DIRECTIVES ---
    function engineStart() {
        if (!isRunning) {
            isRunning = true;
            logToTerminal(">>> EMERGENCY SLUICE GATE ACTION: Filtering Activated.");
            clearTimeout(timerLoop);
            runEngineLoop();
        }
    }

    function engineTest() {
        isRunning = false;
        clearTimeout(timerLoop);
        logToTerminal(">>> DIAGNOSTIC TEST MODE: Injecting parallel validation strings...");
        
        // Simulating immediate validation packets
        processBinaryPacket("BINARY_STREAM_SPECIES_SIGNATURE_DOG_64BIT");
        processBinaryPacket("BINARY_STREAM_SPECIES_SIGNATURE_DOG_64BIT"); // Duplicate length
        processBinaryPacket("BINARY_STREAM_BREED_DATA_METADATA_PIG_OVERLOAD_96BIT"); // Varied size
    }

    function engineResume() {
        if (!isRunning) {
            isRunning = true;
            logToTerminal(">>> RE-ESTABLISHING AUTOMATED STREAMS...");
            runEngineLoop();
        }
    }

    function engineEnd() {
        isRunning = false;
        clearTimeout(timerLoop);
        logToTerminal(">>> ENGINE INTERRUPT: Gate shut. Local transmission safe.");
    }

    // --- THE BINARY SLUICE GATE PATTERN PROCESSOR ---
    function processBinaryPacket(packetString) {
        totalProcessed++;
        let currentLength = packetString.length;

        // Core Thesis: Filter by structural length (Species vs Breed)
        if (lastValidLength !== null && currentLength === lastValidLength) {
            rejectedCount++;
            energySaved += energyPerReject;
            logToTerminal(`REJECT: Redundant binary profile structure (${currentLength} bits). Blocked from storage.`);
        } else {
            lastValidLength = currentLength;
            acceptedCount++;
            logToTerminal(`ACCEPT: Distinct global species width confirmed (${currentLength} bits). Writing to disk.`);
        }

        refreshDashboard();
    }

    function runEngineLoop() {
        if (!isRunning) return;

        // Simulated network streams coming into the computer/phone
        const patterns = [
            "BINARY_STREAM_SPECIES_SIGNATURE_DOG_64BIT",
            "BINARY_STREAM_SPECIES_SIGNATURE_DOG_64BIT", // Repetitive telemetry data
            "BINARY_STREAM_BREED_DATA_METADATA_CHOW_CHOW_BLU_128BIT" // Metadata expansion block
        ];
        
        const randomPacket = patterns[Math.floor(Math.random() * patterns.length)];
        processBinaryPacket(randomPacket);

        // Runs repeatedly every 1.5 seconds
        timerLoop = setTimeout(runEngineLoop, 1500);
    }

    function refreshDashboard() {
        let rate = totalProcessed > 0 ? ((rejectedCount / totalProcessed) * 100) : 0;
        
        document.getElementById("val-total").innerText = totalProcessed;
        document.getElementById("val-accepted").innerText = acceptedCount;
        document.getElementById("val-rejected").innerText = rejectedCount;
        document.getElementById("val-rate").innerText = rate.toFixed(2) + "%";
        document.getElementById("val-saved").innerText = energySaved.toFixed(8) + " kWh";
    }
</script>

</body>
</html>
